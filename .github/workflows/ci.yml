name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (generator + evaluator)
        run: |
          cargo build --release --features generator --bin tig_generator
          cargo build --release --features evaluator --bin tig_evaluator

      - name: Build (solver, one challenge)
        run: cargo build --release --no-default-features --features "solver,satisfiability" --bin tig_solver

      - name: Run tests
        run: cargo test --release --features "satisfiability,knapsack,vehicle_routing,job_scheduling"
